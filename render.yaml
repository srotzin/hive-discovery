services:
  - type: web
    name: hive-discovery
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: HIVETRUST_URL
        value: https://hivetrust.onrender.com
      - key: HIVEGATE_URL
        value: https://hivegate.onrender.com
      - key: HIVE_INTERNAL
        value: hive_internal_125e04e071e8829be631ea0216dd4a0c9b707975fcecaf8c62c6a2ab43327d46
      - key: PYTHON_VERSION
        value: "3.12"
